# Example — generate key with: openssl genpkey -algorithm ed25519 | xxd -p -c 64
# Store the 32-byte private key hex in WASMAGENT_SIGNING_KEY_HEX.
# Full key-generation and secret-injection walkthrough: see docs/deployment.md
# → "K8s secret injection".
apiVersion: v1
kind: Secret
metadata:
  name: wasmagent-signing-key
  namespace: default
type: Opaque
stringData:
  WASMAGENT_SIGNING_KEY_HEX: "<inject-at-deploy-time>"
